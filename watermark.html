<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウォーターマーク（透かし）一括追加ツール | WebTools Pro</title>
    <link rel="icon" href="logo.jpg">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .tool-heading {
            text-align: center;
            background: linear-gradient(45deg, var(--primary-cyan), #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.7rem;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        .drop-zone {
            border: 2px dashed rgba(0, 242, 254, 0.4);
            padding: 40px 20px;
            border-radius: 16px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 25px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary-cyan);
            background-color: rgba(0, 242, 254, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1) inset;
        }
        .drop-zone p { margin: 0; font-size: 0.95rem; color: #d1d1e9; font-weight: bold; line-height: 1.6; }
        .file-select-link { color: var(--primary-cyan); text-decoration: underline; }

        /* エディターパネル */
        .editor-panel {
            display: none;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        /* 設定項目のグリッドレイアウト */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 0.85rem;
            color: var(--primary-cyan);
            font-weight: bold;
            margin-bottom: 8px;
        }
        .input-group input[type="text"], .input-group select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-group input[type="text"]:focus, .input-group select:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
        .input-group select option {
            background-color: #0f1123;
            color: #ffffff;
        }
        .input-group input[type="color"] {
            padding: 0;
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }

        /* スライダー共通デザイン */
        .slider-group { margin-bottom: 20px; }
        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            color: var(--primary-cyan);
        }
        .val-badge {
            background: rgba(0, 242, 254, 0.15);
            color: var(--primary-cyan);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            font-variant-numeric: tabular-nums;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: var(--primary-cyan);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
            transition: 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* プレビューエリア */
        .preview-wrapper {
            text-align: center;
            margin-bottom: 25px;
            background: #000;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .preview-wrapper canvas {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 4px;
        }
        .preview-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: #a55eea;
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .download-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #ffffff; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.2s; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
            text-align: center;
        }
        .download-btn:hover {
            transform: translateY(-2px); box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5);
        }

        .status-msg { text-align: center; font-size: 0.9rem; margin-top: 15px; font-weight: bold; color: #a55eea; }

        /* レスポンシブ */
        @media (max-width: 600px) {
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="logo.jpg" alt="WebTools Pro" class="logo-img">
            <span class="logo-text">WebTools Pro</span>
        </a>
        <nav>
            <a href="index.html">ホーム</a>
            <a href="terms.html">利用規約</a>
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </header>

    <main>
        <div class="container">
            <h2 class="tool-heading">透かし（ウォーターマーク）一括追加</h2>
            <div class="subtitle">複数の画像に、あなたの名前やロゴテキストを一瞬で合成して保存します。</div>

            <div class="drop-zone" id="drop-zone" onclick="document.getElementById('image-input').click()">
                <p>ここに画像ファイル（複数可）をドラッグ＆ドロップするか、<br><span class="file-select-link">ファイルを選択</span></p>
            </div>
            <input type="file" id="image-input" accept="image/*" multiple style="display: none;" onchange="handleFileSelect(event)">

            <div class="editor-panel" id="editor-panel">
                
                <div class="preview-wrapper">
                    <span class="preview-label">プレビュー (1枚目)</span>
                    <canvas id="preview-canvas"></canvas>
                </div>

                <div class="settings-grid">
                    <div class="input-group">
                        <label>透かしのテキスト (名前や@IDなど)</label>
                        <input type="text" id="wm-text" value="© WebTools Pro" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>テキストの色</label>
                        <input type="color" id="wm-color" value="#ffffff" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>配置場所</label>
                        <select id="wm-position" onchange="updatePreview()">
                            <option value="bottom-right">右下 (おすすめ)</option>
                            <option value="bottom-left">左下</option>
                            <option value="top-right">右上</option>
                            <option value="top-left">左上</option>
                            <option value="center">中央</option>
                        </select>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-header">
                        <span>文字のサイズ</span>
                        <span class="val-badge" id="size-badge">10%</span>
                    </div>
                    <input type="range" id="wm-size" min="1" max="30" step="1" value="10" oninput="updatePreview()">
                </div>

                <div class="slider-group">
                    <div class="slider-header">
                        <span>透明度 (Opacity)</span>
                        <span class="val-badge" id="opacity-badge">60%</span>
                    </div>
                    <input type="range" id="wm-opacity" min="0" max="100" step="5" value="60" oninput="updatePreview()">
                </div>

                <button class="download-btn" id="download-btn" onclick="downloadAll()">📥 全ての画像に透かしを入れて保存</button>
                <div class="status-msg" id="status-msg"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="index.html">ホーム</a>
            <a href="terms.html">利用規約</a>
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="contact.html">お問い合わせ</a>
        </div>
        <div class="copyright">&copy; 2026 WebTools Pro. All rights reserved.</div>
        <div class="footer-note">※当サイトのツールは全て端末内(ローカル)で処理されるため、データが外部に送信されることはありません。</div>
    </footer>

    <script>
        let selectedFiles = [];
        let firstImage = new Image();

        const dropZone = document.getElementById("drop-zone");
        const editorPanel = document.getElementById("editor-panel");
        const previewCanvas = document.getElementById("preview-canvas");
        const ctx = previewCanvas.getContext("2d");
        const statusMsg = document.getElementById("status-msg");
        const downloadBtn = document.getElementById("download-btn");

        const wmTextInput = document.getElementById("wm-text");
        const wmColorInput = document.getElementById("wm-color");
        const wmPositionInput = document.getElementById("wm-position");
        const wmSizeInput = document.getElementById("wm-size");
        const wmOpacityInput = document.getElementById("wm-opacity");
        const sizeBadge = document.getElementById("size-badge");
        const opacityBadge = document.getElementById("opacity-badge");

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }, false);
        });
        dropZone.addEventListener('drop', (e) => {
            const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
            if (files.length > 0) { loadFiles(files); }
        }, false);

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) { loadFiles(files); }
            event.target.value = '';
        }

        function loadFiles(files) {
            selectedFiles = files;
            statusMsg.innerText = `${files.length}枚の画像が選択されました。`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                firstImage.onload = function() {
                    editorPanel.style.display = "block";
                    updatePreview();
                };
                firstImage.src = e.target.result;
            };
            reader.readAsDataURL(files[0]);
        }

        function updatePreview() {
            if (!firstImage.src) return;

            sizeBadge.innerText = wmSizeInput.value + "%";
            opacityBadge.innerText = wmOpacityInput.value + "%";

            previewCanvas.width = firstImage.width;
            previewCanvas.height = firstImage.height;

            ctx.drawImage(firstImage, 0, 0);
            drawWatermark(ctx, previewCanvas.width, previewCanvas.height);
        }

        function drawWatermark(context, width, height) {
            const text = wmTextInput.value;
            if (!text) return;

            const color = wmColorInput.value;
            const position = wmPositionInput.value;
            const fontSize = Math.floor(width * (wmSizeInput.value / 100));
            const opacity = wmOpacityInput.value / 100;
            const padding = Math.floor(fontSize * 0.5); 

            context.globalAlpha = opacity;
            context.fillStyle = color;
            context.font = `bold ${fontSize}px 'Helvetica Neue', Arial, sans-serif`;

            let x, y;
            
            if (position.includes("left")) {
                context.textAlign = "left";
                x = padding;
            } else if (position.includes("right")) {
                context.textAlign = "right";
                x = width - padding;
            } else {
                context.textAlign = "center";
                x = width / 2;
            }

            if (position.includes("top")) {
                context.textBaseline = "top";
                y = padding;
            } else if (position.includes("bottom")) {
                context.textBaseline = "bottom";
                y = height - padding;
            } else {
                context.textBaseline = "middle";
                y = height / 2;
            }

            context.shadowColor = "rgba(0, 0, 0, 0.7)";
            context.shadowBlur = 10;
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;

            context.fillText(text, x, y);

            context.globalAlpha = 1.0;
            context.shadowColor = "transparent";
        }

        async function downloadAll() {
            if (selectedFiles.length === 0) return;
            
            downloadBtn.disabled = true;
            downloadBtn.innerText = "処理中...";
            
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                statusMsg.innerText = `${selectedFiles.length}枚中 ${i + 1}枚目を処理中...`;
                
                await processAndDownloadSingleImage(file);
                
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            statusMsg.style.color = "#2ecc71";
            statusMsg.innerText = "すべての画像に透かしを追加して保存しました！\n※ブラウザ上部に「複数ファイルのダウンロードを許可しますか？」と出た場合は「許可」を押してください。";
            downloadBtn.disabled = false;
            downloadBtn.innerText = "📥 全ての画像に透かしを入れて保存";
        }

        function processAndDownloadSingleImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const tempCanvas = document.createElement("canvas");
                        const tempCtx = tempCanvas.getContext("2d");
                        tempCanvas.width = img.width;
                        tempCanvas.height = img.height;

                        tempCtx.drawImage(img, 0, 0);
                        drawWatermark(tempCtx, tempCanvas.width, tempCanvas.height);

                        const dataUrl = tempCanvas.toDataURL("image/jpeg", 0.95);
                        
                        const link = document.createElement("a");
                        link.href = dataUrl;
                        const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                        link.download = `${baseName}_watermark.jpg`;
                        link.click();
                        
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
